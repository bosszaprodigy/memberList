version: "3.9"

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: member_backend_dev
    volumes:
      - ./backend:/app
    ports:
      - "3000:3000"
    environment:
      ENVIRONMENT: development
      MONGO_URI: ${MONGO_URI}
      MONGO_DB: member_db
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      PORT: 3000
    networks:
      - member_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: member_frontend_dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "8080:5173"
    environment:
      VITE_API_URL: http://backend:3000
      VITE_WS_URL: ws://backend:3000
    depends_on:
      - backend
    networks:
      - member_net

networks:
  member_net:
    driver: bridge
